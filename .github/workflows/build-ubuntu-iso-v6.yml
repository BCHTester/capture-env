name: Build Bootable Ubuntu ISO

on:
  workflow_dispatch:
  #schedule:
    #- cron: '0 2 * * 0'  # Weekly on Sundays at 2am UTC

jobs:
  build-iso:
    runs-on: ubuntu-24.04
    timeout-minutes: 340

    steps:
      # ── 0. Show disk layout ────────────────────────────────────────────────
      - name: Show disk layout
        continue-on-error: true
        run: |
          df -h
          sudo du -sh /usr/local /usr/share /usr/lib /opt /home/runner 2>/dev/null | sort -rh

      # ── 1. Install live-build ──────────────────────────────────────────────
      - name: Install live-build and tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            live-build debootstrap squashfs-tools xorriso \
            grub-pc-bin grub-efi-amd64-bin mtools rsync genisoimage

      # ── 2. Initialise live-build config ───────────────────────────────────
      - name: Initialise live-build config
        run: |
          mkdir -p ~/live-build
          cd ~/live-build
          lb config \
            --mode ubuntu \
            --system live \
            --distribution noble \
            --archive-areas "main restricted universe multiverse" \
            --apt-recommends false \
            --binary-images iso-hybrid \
            --memtest none \
            --linux-flavours generic \
            --bootappend-live "boot=live components locales=en_US.UTF-8 keyboard-layouts=us username=runner hostname=ubuntu-runner" \
            --iso-volume "Ubuntu-Runner-Backup" \
            --compression xz

      # ── 3. Inject package list ─────────────────────────────────────────────
      # Dump all installed packages and let live-build's apt resolve what is
      # actually available in the Ubuntu archive. Packages from third-party
      # repos that are excluded below are already baked into includes.chroot
      # via the /usr/local and /opt staging steps.
      - name: Inject package list
        run: |
          mkdir -p ~/live-build/config/package-lists

          # Strip :amd64 arch suffixes so apt can resolve them cleanly
          dpkg-query -W -f='${PackageSpec}\n' | sed 's/:amd64$//' | sort -u \
            > ~/live-build/config/package-lists/runner.list.chroot

          # Ensure live system essentials are present
          for pkg in live-boot live-config live-config-systemd \
                     network-manager sudo openssh-client curl wget rsync; do
            grep -qx "$pkg" ~/live-build/config/package-lists/runner.list.chroot \
              || echo "$pkg" >> ~/live-build/config/package-lists/runner.list.chroot
          done

          echo "Package list: $(wc -l < ~/live-build/config/package-lists/runner.list.chroot) entries"

      # ── 4. Inject Ubuntu-only apt sources and keys ────────────────────────
      # Third-party repos (Microsoft, Google, etc.) are intentionally excluded.
      # Their GPG keys are not present inside the live-build chroot, causing
      # apt to fail. Their packages are already in includes.chroot anyway.
      - name: Inject Ubuntu apt sources and keys
        run: |
          mkdir -p ~/live-build/config/archives

          for f in /etc/apt/sources.list.d/*.list /etc/apt/sources.list.d/*.sources; do
            [ -f "$f" ] || continue
            if grep -qiE '(archive|security|ports|cloud-images)\.ubuntu\.com' "$f"; then
              cp "$f" ~/live-build/config/archives/
              echo "  included: $(basename "$f")"
            else
              echo "  skipped:  $(basename "$f")"
            fi
          done

          for f in /usr/share/keyrings/ubuntu-*.gpg /usr/share/keyrings/ubuntu-*.asc; do
            [ -f "$f" ] && cp "$f" ~/live-build/config/archives/ || true
          done

          echo "Archives:" && ls ~/live-build/config/archives/

      # ── 5. Stage /etc ─────────────────────────────────────────────────────
      - name: Stage /etc into ISO rootfs
        run: |
          INCLUDES=~/live-build/config/includes.chroot
          mkdir -p "$INCLUDES/etc"
          sudo rsync -a --ignore-errors \
            --exclude='shadow'           \
            --exclude='shadow-'          \
            --exclude='gshadow'          \
            --exclude='gshadow-'         \
            --exclude='ssl/private/'     \
            --exclude='hostname'         \
            --exclude='hosts'            \
            --exclude='resolv.conf'      \
            --exclude='netplan/'         \
            --exclude='network/'         \
            --exclude='NetworkManager/'  \
            --exclude='apt/'             \
            /etc/ "$INCLUDES/etc/" 2>/dev/null || true
          echo "/etc: $(sudo find $INCLUDES/etc -type f 2>/dev/null | wc -l) files"

      # ── 6. Stage /usr/local ───────────────────────────────────────────────
      - name: Stage /usr/local into ISO rootfs
        run: |
          INCLUDES=~/live-build/config/includes.chroot
          mkdir -p "$INCLUDES/usr/local"
          sudo rsync -a --ignore-errors \
            --exclude='*.pyc' --exclude='__pycache__/' \
            /usr/local/ "$INCLUDES/usr/local/" 2>/dev/null || true
          echo "/usr/local: $(sudo du -sh $INCLUDES/usr/local/ 2>/dev/null | cut -f1)"

      # ── 7. Stage /opt ─────────────────────────────────────────────────────
      - name: Stage /opt into ISO rootfs
        run: |
          INCLUDES=~/live-build/config/includes.chroot
          mkdir -p "$INCLUDES/opt"
          sudo rsync -a --ignore-errors \
            --exclude='*.pyc' --exclude='__pycache__/' \
            /opt/ "$INCLUDES/opt/" 2>/dev/null || true
          echo "/opt: $(sudo du -sh $INCLUDES/opt/ 2>/dev/null | cut -f1)"

      # ── 8. Stage language toolchains into /etc/skel ───────────────────────
      - name: Stage language toolchains
        run: |
          INCLUDES=~/live-build/config/includes.chroot
          SKEL="$INCLUDES/etc/skel"
          mkdir -p "$SKEL"

          if [ -d /usr/lib/jvm ]; then
            mkdir -p "$INCLUDES/usr/lib/jvm"
            sudo rsync -a --ignore-errors /usr/lib/jvm/ "$INCLUDES/usr/lib/jvm/" 2>/dev/null || true
          fi

          for pair in \
            "$HOME/.cargo:.cargo"   \
            "$HOME/.rustup:.rustup" \
            "$HOME/.nvm:.nvm"       \
            "$HOME/.volta:.volta"   \
            "$HOME/.pyenv:.pyenv"   \
            "$HOME/.rbenv:.rbenv"   \
            "$HOME/.rvm:.rvm"; do
            src="${pair%%:*}"
            dst="${pair##*:}"
            if [ -d "$src" ]; then
              rsync -a --ignore-errors "$src/" "$SKEL/$dst/" 2>/dev/null || true
              echo "  $dst: $(du -sh $SKEL/$dst/ 2>/dev/null | cut -f1 || echo 0)"
            fi
          done

      # ── 9. Stage home dotfiles into /etc/skel ─────────────────────────────
      - name: Stage home dotfiles
        run: |
          SKEL=~/live-build/config/includes.chroot/etc/skel
          mkdir -p "$SKEL"

          find ~ -maxdepth 1 -name '.*' -type f \
            ! -name '.bash_history' ! -name '.lesshst' ! -name '.viminfo' \
            -exec cp {} "$SKEL/" \; 2>/dev/null || true

          [ -d ~/.config ] && rsync -a --ignore-errors \
            --exclude='*/Cache/' --exclude='*/CacheStorage/' \
            --exclude='google-chrome/' --exclude='chromium/' \
            ~/.config/ "$SKEL/.config/" 2>/dev/null || true

          [ -d ~/.local/share ] && rsync -a --ignore-errors \
            --exclude='Trash/' --exclude='*/Cache/' \
            ~/.local/share/ "$SKEL/.local/share/" 2>/dev/null || true

          echo "skel: $(du -sh $SKEL 2>/dev/null | cut -f1)"

      # ── 10. Write chroot fixup hook ────────────────────────────────────────
      # Written via Python to avoid all YAML/shell heredoc quoting issues.
      - name: Create chroot fixup hook
        run: |
          mkdir -p ~/live-build/config/hooks/live
          python3 - << 'PYEOF'
          import os, stat

          hook = (
              '#!/bin/bash\n'
              'set -e\n'
              '\n'
              '# Rebuild dynamic linker cache after /usr/local libs were placed\n'
              'ldconfig\n'
              '\n'
              '# Ensure /usr/local/bin is in system-wide PATH\n'
              'echo \'PATH="/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"\' > /etc/environment\n'
              '\n'
              '# Fix ownership of runner home if the user exists\n'
              'id runner &>/dev/null && chown -R runner:runner /home/runner 2>/dev/null || true\n'
              '\n'
              '# Add toolchain init lines to /etc/skel/.bashrc\n'
              'SBRC=/etc/skel/.bashrc\n'
              'touch "$SBRC"\n'
              '\n'
              'if [ -d /etc/skel/.cargo ]; then\n'
              '  grep -q cargo/env "$SBRC" || echo \'. "$HOME/.cargo/env"\' >> "$SBRC"\n'
              'fi\n'
              '\n'
              'if [ -d /etc/skel/.nvm ]; then\n'
              '  if ! grep -q NVM_DIR "$SBRC"; then\n'
              '    printf \'export NVM_DIR="$HOME/.nvm"\\n[ -s "$NVM_DIR/nvm.sh" ] && \\\\. "$NVM_DIR/nvm.sh"\\n\' >> "$SBRC"\n'
              '  fi\n'
              'fi\n'
              '\n'
              'if [ -d /etc/skel/.pyenv ]; then\n'
              '  if ! grep -q pyenv "$SBRC"; then\n'
              '    printf \'export PYENV_ROOT="$HOME/.pyenv"\\nexport PATH="$PYENV_ROOT/bin:$PATH"\\neval "$(pyenv init -)"\n\' >> "$SBRC"\n'
              '  fi\n'
              'fi\n'
              '\n'
              'if [ -d /etc/skel/.rbenv ]; then\n'
              '  grep -q rbenv "$SBRC" || echo \'eval "$(~/.rbenv/bin/rbenv init - bash)"\' >> "$SBRC"\n'
              'fi\n'
          )

          path = os.path.expanduser(
              '~/live-build/config/hooks/live/0100-fixup.hook.chroot'
          )
          with open(path, 'w') as f:
              f.write(hook)
          os.chmod(path, stat.S_IRWXU | stat.S_IRGRP | stat.S_IXGRP | stat.S_IROTH | stat.S_IXOTH)
          print('Hook written OK')
          PYEOF

      # ── 11. Pre-build disk check ───────────────────────────────────────────
      - name: Show disk state before build
        continue-on-error: true
        run: |
          df -h
          sudo du -sh ~/live-build/config/includes.chroot/*/ 2>/dev/null | sort -rh || true
          echo "live-build total: $(sudo du -sh ~/live-build/ 2>/dev/null | cut -f1)"

      # ── 12. Build the ISO ──────────────────────────────────────────────────
      - name: Build ISO
        working-directory: /home/runner/live-build
        run: |
          sudo lb build 2>&1 | tee /tmp/live-build.log
          echo "=== ISO output ==="
          ls -lh ~/live-build/*.iso ~/live-build/live-image*.hybrid.iso 2>/dev/null

      # ── 13. Name ISO and generate checksum ────────────────────────────────
      - name: Name ISO and generate checksum
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H-%M-%SZ")
          OS_VERSION=$(lsb_release -rs 2>/dev/null || echo "24.04")
          ISO_NAME="ubuntu-runner-${OS_VERSION}-${TIMESTAMP}.iso"
          ISO_SRC=$(ls ~/live-build/*.iso ~/live-build/live-image*.hybrid.iso 2>/dev/null | head -1)
          [ -z "$ISO_SRC" ] && echo "ERROR: no ISO found" && exit 1
          mv "$ISO_SRC" "$HOME/${ISO_NAME}"
          sha256sum "$HOME/${ISO_NAME}" > "$HOME/${ISO_NAME}.sha256"
          echo "ISO_FILE=$HOME/${ISO_NAME}"       >> $GITHUB_ENV
          echo "ISO_SHA=$HOME/${ISO_NAME}.sha256"  >> $GITHUB_ENV
          echo "ISO_NAME=${ISO_NAME}"              >> $GITHUB_ENV
          echo "Built: ${ISO_NAME} ($(du -sh $HOME/${ISO_NAME} | cut -f1))"

      # ── 14. Upload to Google Drive ─────────────────────────────────────────
      - name: Install rclone
        run: curl https://rclone.org/install.sh | sudo bash

      - name: Configure rclone for Google Drive
        env:
          GDRIVE_CLIENT_ID:      ${{ secrets.GDRIVE_CLIENT_ID }}
          GDRIVE_CLIENT_SECRET:  ${{ secrets.GDRIVE_CLIENT_SECRET }}
          GDRIVE_TOKEN:          ${{ secrets.GDRIVE_TOKEN }}
          GDRIVE_ROOT_FOLDER_ID: ${{ secrets.GDRIVE_ROOT_FOLDER_ID }}
        run: |
          mkdir -p ~/.config/rclone
          python3 - << 'PYEOF'
          import os
          lines = [
              '[gdrive]',
              'type = drive',
              'client_id = ' + os.environ['GDRIVE_CLIENT_ID'],
              'client_secret = ' + os.environ['GDRIVE_CLIENT_SECRET'],
              'token = ' + os.environ['GDRIVE_TOKEN'],
              'root_folder_id = ' + os.environ['GDRIVE_ROOT_FOLDER_ID'],
          ]
          path = os.path.expanduser('~/.config/rclone/rclone.conf')
          with open(path, 'w') as f:
              f.write('\n'.join(lines) + '\n')
          print('rclone config written')
          PYEOF

      - name: Upload ISO and checksum to Google Drive
        run: |
          rclone copy "${{ env.ISO_FILE }}" gdrive:github-iso-builds \
            --drive-chunk-size 256M --transfers 1 --progress --stats 30s
          rclone copy "${{ env.ISO_SHA }}" gdrive:github-iso-builds
          echo "Uploaded: github-iso-builds/${{ env.ISO_NAME }}"

      - name: Clean up rclone config
        if: always()
        run: rm -f ~/.config/rclone/rclone.conf

      # ── 15. Upload build log ───────────────────────────────────────────────
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: live-build-log-${{ github.run_id }}
          path: /tmp/live-build.log
          retention-days: 7
